<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바텀 라인전 고수 노트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  :root {
    --bg: #f4f6fa;
    --surface: #ffffff;
    --surface2: #f0f2f7;
    --border: #e2e6ef;
    --border-hover: #c8cfe0;
    --gold: #b8860b;
    --gold-light: #f5e6b8;
    --gold-mid: #d4a820;
    --blue: #2563eb;
    --blue-light: #dbeafe;
    --text: #1e2433;
    --text-dim: #4b5675;
    --text-muted: #9099b0;
    --red: #dc2626;
    --red-light: #fee2e2;
    --green: #16a34a;
    --green-light: #dcfce7;
    --purple: #7c3aed;
    --purple-light: #ede9fe;
    --orange: #ea580c;
    --orange-light: #ffedd5;
    --teal: #0d9488;
    --teal-light: #ccfbf1;
    --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 2px 12px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 16px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    padding: 20px 0 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .header-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
  .header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .emblem {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--gold-mid), #f0c040);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header-text h1 { font-size: 19px; font-weight: 800; color: var(--text); }
  .header-text p { font-size: 11px; color: var(--text-muted); letter-spacing: 0.07em; text-transform: uppercase; margin-top: 1px; }

  /* ─── TABS ─── */
  .tabs { display: flex; }
  .tab {
    padding: 10px 20px; cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--text-muted); border-bottom: 2px solid transparent;
    transition: all 0.18s; white-space: nowrap; user-select: none;
  }
  .tab:hover { color: var(--text-dim); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  /* ─── ADMIN BUTTON ─── */
  .admin-toggle {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--surface); border: 1.5px solid var(--border);
    box-shadow: var(--shadow-hover); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all 0.18s;
  }
  .admin-toggle:hover { background: var(--blue); border-color: var(--blue); }
  .admin-toggle:hover span { filter: brightness(10); }
  .admin-toggle.active { background: var(--blue); border-color: var(--blue); }
  .admin-toggle.active span { filter: brightness(10); }

  /* ─── MODAL ─── */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 300;
    align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px;
    padding: 28px; width: 90%; max-width: 520px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    max-height: 85vh; overflow-y: auto;
  }
  .modal-title {
    font-size: 16px; font-weight: 800; color: var(--text);
    margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
  .modal-close {
    margin-left: auto; background: none; border: none;
    cursor: pointer; font-size: 18px; color: var(--text-muted);
    padding: 2px 6px; border-radius: 4px;
  }
  .modal-close:hover { background: var(--surface2); }

  /* ─── FORM ─── */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 9px 12px; color: var(--text);
    font-size: 13px; font-family: inherit; outline: none;
    transition: border-color 0.18s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--blue);
  }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select { cursor: pointer; }

  .btn {
    padding: 9px 18px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 700; font-family: inherit;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-danger { background: var(--red-light); color: var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text-dim); border: 1.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--blue); color: var(--blue); }
  .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; flex-wrap: wrap; }

  /* ─── PASSWORD SCREEN ─── */
  .pw-screen { text-align: center; padding: 10px 0 4px; }
  .pw-screen p { font-size: 13px; color: var(--text-dim); margin-bottom: 14px; }
  .pw-input-row { display: flex; gap: 8px; }
  .pw-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

  /* ─── ADMIN PANEL ─── */
  .admin-panel { display: none; }
  .admin-panel.open { display: block; }
  .admin-section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 10px; margin-top: 18px;
  }
  .admin-action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }

  /* ─── SAVING INDICATOR ─── */
  .save-indicator {
    display: none; position: fixed; top: 80px; right: 24px; z-index: 400;
    background: var(--text); color: #fff; font-size: 12px; font-weight: 600;
    padding: 8px 16px; border-radius: 20px; box-shadow: var(--shadow-hover);
  }
  .save-indicator.show { display: block; }
  .save-indicator.success { background: var(--green); }
  .save-indicator.error { background: var(--red); }

  /* ─── MAIN CONTENT ─── */
  main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .controls { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; pointer-events: none; }
  .search-input {
    width: 100%; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 9px 12px 9px 34px; color: var(--text);
    font-size: 13px; font-family: inherit; outline: none;
    transition: border-color 0.18s; box-shadow: var(--shadow);
  }
  .search-input:focus { border-color: var(--blue); }
  .search-input::placeholder { color: var(--text-muted); }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 13px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text-dim); font-size: 12px;
    font-family: inherit; font-weight: 500; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; box-shadow: var(--shadow);
  }
  .filter-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
  .filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }

  .stats-bar { font-size: 11px; color: var(--text-muted); margin-bottom: 18px; }
  .stats-bar span { color: var(--blue); font-weight: 700; }

  /* ─── CONCEPT CARDS ─── */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 16px 18px;
    transition: box-shadow 0.18s, transform 0.15s;
    position: relative; overflow: hidden; box-shadow: var(--shadow);
  }
  .card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--topic-color, var(--blue)); border-radius: 10px 0 0 10px;
  }
  .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
  .card.hidden { display: none; }

  .card-tag {
    display: inline-block; font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--topic-color, var(--blue));
    background: var(--topic-bg, var(--blue-light));
    border-radius: 4px; padding: 2px 8px; margin-bottom: 9px;
  }
  .card-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 7px; line-height: 1.35; }
  .card-desc { font-size: 13px; color: var(--text-dim); line-height: 1.7; white-space: pre-line; }

  /* 관리자 모드 카드 버튼 */
  .card-admin-btns {
    display: none; gap: 6px; margin-top: 12px; padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  body.admin-mode .card-admin-btns { display: flex; }
  .card-edit-btn { font-size: 11px; padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); cursor: pointer; font-family: inherit; }
  .card-edit-btn:hover { border-color: var(--blue); color: var(--blue); }
  .card-del-btn { font-size: 11px; padding: 4px 10px; border-radius: 5px; border: 1px solid var(--red-light); background: var(--red-light); color: var(--red); cursor: pointer; font-family: inherit; }
  .card-del-btn:hover { background: var(--red); color: #fff; }

  /* ─── TOPIC COLORS ─── */
  .topic-딜교환    { --topic-color: var(--red);    --topic-bg: var(--red-light); }
  .topic-라인전    { --topic-color: var(--gold);   --topic-bg: var(--gold-light); }
  .topic-레벨관리  { --topic-color: var(--green);  --topic-bg: var(--green-light); }
  .topic-매치업    { --topic-color: var(--purple);  --topic-bg: var(--purple-light); }
  .topic-미니언관리 { --topic-color: var(--teal);  --topic-bg: var(--teal-light); }
  .topic-생존      { --topic-color: var(--red);    --topic-bg: var(--red-light); }
  .topic-서포터운영 { --topic-color: var(--green); --topic-bg: var(--green-light); }
  .topic-스킬활용  { --topic-color: var(--purple); --topic-bg: var(--purple-light); }
  .topic-시야      { --topic-color: var(--teal);   --topic-bg: var(--teal-light); }
  .topic-오브젝트  { --topic-color: var(--gold);   --topic-bg: var(--gold-light); }
  .topic-운영      { --topic-color: var(--gold);   --topic-bg: var(--gold-light); }
  .topic-정글의식  { --topic-color: var(--orange); --topic-bg: var(--orange-light); }
  .topic-정보은닉  { --topic-color: var(--purple); --topic-bg: var(--purple-light); }
  .topic-챔피언활용 { --topic-color: var(--red);   --topic-bg: var(--red-light); }
  .topic-포지셔닝  { --topic-color: var(--blue);   --topic-bg: var(--blue-light); }
  .topic-포탑      { --topic-color: var(--orange); --topic-bg: var(--orange-light); }
  .topic-심리전    { --topic-color: var(--purple); --topic-bg: var(--purple-light); }

  /* ─── CHAMP CARDS ─── */
  .champ-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; margin-bottom: 16px; overflow: hidden;
    box-shadow: var(--shadow); transition: box-shadow 0.18s, transform 0.15s;
  }
  .champ-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
  .champ-card.hidden { display: none; }
  .champ-header {
    background: var(--surface2); padding: 14px 20px;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid var(--border);
  }
  .champ-img-wrap {
    width: 52px; height: 52px; border-radius: 10px;
    background: var(--gold-light); border: 2px solid var(--gold-mid);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0; overflow: hidden;
  }
  .champ-img-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
  .champ-name { font-size: 17px; font-weight: 800; color: var(--text); }
  .champ-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .champ-body { padding: 18px 20px; }
  .champ-section { margin-bottom: 16px; }
  .champ-section:last-child { margin-bottom: 0; }
  .champ-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .combo-badges { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .combo-badge { background: var(--blue-light); border: 1.5px solid #bfdbfe; border-radius: 6px; padding: 4px 10px; font-size: 13px; font-weight: 700; color: var(--blue); font-family: 'Courier New', monospace; }
  .combo-arrow { color: var(--text-muted); font-size: 12px; }
  .tip-item { display: flex; gap: 9px; align-items: flex-start; padding: 9px 12px; background: var(--surface2); border-radius: 7px; margin-bottom: 6px; font-size: 13px; color: var(--text-dim); line-height: 1.65; }
  .tip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold-mid); flex-shrink: 0; margin-top: 6px; }

  .champ-admin-btns {
    display: none; gap: 6px; margin-top: 12px; padding: 12px 20px;
    border-top: 1px solid var(--border);
  }
  body.admin-mode .champ-admin-btns { display: flex; }

  /* ─── SUP CARDS ─── */
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1.5px solid var(--border); }
  .sup-card { background: var(--surface); border: 1.5px solid var(--border); border-left: 4px solid var(--red); border-radius: 10px; padding: 16px 20px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .sup-champ-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .sup-badge { font-size: 10px; font-weight: 700; background: var(--red-light); color: var(--red); border-radius: 4px; padding: 2px 7px; }
  .sup-champ-name { font-size: 15px; font-weight: 700; color: var(--red); }
  .sup-content { font-size: 13px; color: var(--text-dim); line-height: 1.7; white-space: pre-line; }
  .sup-admin-btns { display: none; gap: 6px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
  body.admin-mode .sup-admin-btns { display: flex; }

  /* ─── ADMIN MODE BANNER ─── */
  .admin-banner {
    display: none; background: var(--blue); color: #fff;
    text-align: center; font-size: 12px; font-weight: 600;
    padding: 7px; letter-spacing: 0.04em;
  }
  body.admin-mode .admin-banner { display: block; }

  /* ─── EMPTY STATE ─── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 13px; }
  .empty-state .icon { font-size: 32px; margin-bottom: 10px; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- 관리자 모드 배너 -->
<div class="admin-banner">🔧 관리자 모드 활성화 — 각 카드에서 수정·삭제할 수 있어요</div>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="emblem">⚔️</div>
      <div class="header-text">
        <h1>바텀 라인전 고수 노트</h1>
        <p>League of Legends · ADC &amp; Support · Bottom Lane</p>
      </div>
    </div>
    <nav class="tabs">
      <div class="tab active" data-tab="concepts">📋 개념 정리</div>
      <div class="tab" data-tab="champs">🏹 챔피언별 팁</div>
      <div class="tab" data-tab="sup">🛡️ 상대 서포터 대응</div>
    </nav>
  </div>
</header>

<main>
  <!-- TAB 1 -->
  <div class="tab-content active" id="tab-concepts">
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="conceptSearch" type="text" placeholder="개념 검색...">
      </div>
      <div class="filters" id="conceptFilters"></div>
    </div>
    <div class="stats-bar" id="conceptStats"></div>
    <div class="cards-grid" id="conceptCards"></div>
    <div class="empty-state" id="conceptEmpty" style="display:none">
      <div class="icon">🔎</div>검색 결과가 없습니다
    </div>
  </div>

  <!-- TAB 2 -->
  <div class="tab-content" id="tab-champs">
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="champSearch" type="text" placeholder="챔피언 검색...">
      </div>
      <div class="filters" id="champFilters"></div>
    </div>
    <div class="stats-bar" id="champStats"></div>
    <div id="champCards"></div>
    <div class="empty-state" id="champEmpty" style="display:none">
      <div class="icon">🔎</div>검색 결과가 없습니다
    </div>
  </div>

  <!-- TAB 3 -->
  <div class="tab-content" id="tab-sup">
    <div class="section-label">상대 서포터 대응법</div>
    <div id="supCards"></div>
  </div>
</main>

<!-- 관리자 버튼 -->
<button class="admin-toggle" id="adminToggle" title="관리자 모드">
  <span>🔧</span>
</button>

<!-- 저장 표시 -->
<div class="save-indicator" id="saveIndicator"></div>

<!-- ────────── 비밀번호 모달 ────────── -->
<div class="modal-backdrop" id="pwModal">
  <div class="modal">
    <div class="modal-title">
      🔒 관리자 로그인
      <button class="modal-close" id="pwModalClose">✕</button>
    </div>
    <div class="pw-screen">
      <p>비밀번호를 입력해 주세요</p>
      <div class="pw-input-row">
        <input class="form-input" type="password" id="pwInput" placeholder="비밀번호">
        <button class="btn btn-primary" id="pwConfirm">확인</button>
      </div>
      <div class="pw-error" id="pwError">비밀번호가 틀렸습니다</div>
    </div>
  </div>
</div>

<!-- ────────── 개념 추가/수정 모달 ────────── -->
<div class="modal-backdrop" id="conceptModal">
  <div class="modal">
    <div class="modal-title">
      <span id="conceptModalTitle">📋 개념 추가</span>
      <button class="modal-close" id="conceptModalClose">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">주제</label>
      <input class="form-input" id="f-topic" placeholder="예: 딜교환, 포지셔닝...">
    </div>
    <div class="form-group">
      <label class="form-label">핵심내용</label>
      <input class="form-input" id="f-title" placeholder="한 줄 요약">
    </div>
    <div class="form-group">
      <label class="form-label">세부설명</label>
      <textarea class="form-textarea" id="f-desc" placeholder="자세한 설명..."></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="conceptModalCancel">취소</button>
      <button class="btn btn-primary" id="conceptModalSave">저장</button>
    </div>
  </div>
</div>

<!-- ────────── 챔피언 추가/수정 모달 ────────── -->
<div class="modal-backdrop" id="champModal">
  <div class="modal">
    <div class="modal-title">
      <span id="champModalTitle">🏹 챔피언 추가</span>
      <button class="modal-close" id="champModalClose">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">챔피언 이름</label>
      <input class="form-input" id="f-champ-name" placeholder="예: 바루스">
    </div>
    <div class="form-group">

// ─── 상태 ───
let adminMode = false;

// ─── 저장 표시 ───
function showSave(msg, type='') {
  const el = document.getElementById('saveIndicator');
  el.textContent = msg;
  el.className = 'save-indicator show ' + type;
  setTimeout(() => el.className = 'save-indicator', 3000);
}

// ─── GitHub에 저장 ───
async function saveToGitHub() {
  showSave('⏳ 저장 중...');
  try {
    // 현재 파일의 SHA 가져오기
    const infoRes = await fetch(
      `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.file}`,
      { headers: { Authorization: `token ${GITHUB_CONFIG.token}` } }
    );
    const info = await infoRes.json();
    const sha = info.sha;

    // 현재 HTML에서 DATA 부분만 교체
    const currentHTML = await fetch(location.href + '?nocache=' + Date.now()).then(r => r.text());
    const newDataStr = 'let DATA = ' + JSON.stringify(DATA, null, 2) + ';';
    const updated = currentHTML.replace(/let DATA = \{[\s\S]*?\};\n\n/, newDataStr + '\n\n');

    // base64 인코딩
    const encoded = btoa(unescape(encodeURIComponent(updated)));

    // 파일 업데이트
    const putRes = await fetch(
      `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.file}`,
      {
        method: 'PUT',
        headers: {
          Authorization: `token ${GITHUB_CONFIG.token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: '데이터 업데이트',
          content: encoded,
          sha: sha,
          branch: GITHUB_CONFIG.branch
        })
      }
    );

    if (putRes.ok) {
      showSave('✅ 저장 완료! (1~2분 후 반영)', 'success');
    } else {
      showSave('❌ 저장 실패', 'error');
    }
  } catch(e) {
    showSave('❌ 오류 발생: ' + e.message, 'error');
  }
}

// ─── 렌더링 함수들 ───
function renderConcepts() {
  const cardsEl = document.getElementById('conceptCards');
  const filtersEl = document.getElementById('conceptFilters');
  cardsEl.innerHTML = '';
  filtersEl.innerHTML = '';

  const topics = [...new Set(DATA.text.map(d => d['주제']))];

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = '전체';
  allBtn.dataset.topic = 'all';
  filtersEl.appendChild(allBtn);
  topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = t;
    btn.dataset.topic = t;
    filtersEl.appendChild(btn);
  });

  DATA.text.forEach((item, i) => {
    const card = document.createElement('div');
    const tc = 'topic-' + item['주제'].replace(/\s+/g, '');
    card.className = `card ${tc}`;
    card.dataset.topic = item['주제'];
    card.innerHTML = `
      <div class="card-tag">${item['주제']}</div>
      <div class="card-title">${item['핵심내용']}</div>
      <div class="card-desc">${item['세부설명']}</div>
      <div class="card-admin-btns">
        <button class="card-edit-btn" data-idx="${i}">✏️ 수정</button>
        <button class="card-del-btn" data-idx="${i}">🗑 삭제</button>
      </div>`;
    cardsEl.appendChild(card);
  });

  updateConceptStats();
  initConceptFilter();
}

function renderChamps() {
  const el = document.getElementById('champCards');
  const filtersEl = document.getElementById('champFilters');
  el.innerHTML = '';
  filtersEl.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = '전체';
  allBtn.dataset.champ = 'all';
  filtersEl.appendChild(allBtn);

  DATA.champ.forEach((champ, i) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = champ.name;
    btn.dataset.champ = champ.name;
    filtersEl.appendChild(btn);

    const card = document.createElement('div');
    card.className = 'champ-card';
    card.dataset.champ = champ.name;

    const imgHTML = champ.image
      ? `<img src="${champ.image}" alt="${champ.name}">`
      : `<span>${champ.icon}</span>`;

    const comboHTML = champ.combo && champ.combo.length
      ? champ.combo.map((c, ci) =>
          `<span class="combo-badge">${c}</span>${ci < champ.combo.length-1 ? '<span class="combo-arrow">→</span>' : ''}`
        ).join('')
      : '<span style="color:var(--text-muted)">-</span>';

    const tipsHTML = (champ.tips||[]).map(t =>
      `<div class="tip-item"><div class="tip-dot"></div><div>${t}</div></div>`
    ).join('');

    card.innerHTML = `
      <div class="champ-header">
        <div class="champ-img-wrap">${imgHTML}</div>
        <div>
          <div class="champ-name">${champ.name}</div>
          <div class="champ-sub">챔피언 팁 · ${(champ.tips||[]).length}개</div>
        </div>
      </div>
      <div class="champ-body">
        ${champ.combo && champ.combo.length ? `<div class="champ-section"><div class="champ-label">콤보 순서</div><div class="combo-badges">${comboHTML}</div></div>` : ''}
        <div class="champ-section"><div class="champ-label">꿀팁</div>${tipsHTML}</div>
      </div>
      <div class="champ-admin-btns">
        <button class="card-edit-btn" data-idx="${i}">✏️ 수정</button>
        <button class="card-del-btn" data-idx="${i}">🗑 삭제</button>
      </div>`;
    el.appendChild(card);
  });

  updateChampStats();
  initChampFilter();
}

// ─── 필터/검색 ───
let conceptActiveTopic = 'all';
let champActiveFilter = 'all';

function updateConceptStats() {
  const visible = document.querySelectorAll('#conceptCards .card:not(.hidden)').length;
  document.getElementById('conceptStats').innerHTML = `<span>${visible}</span> / ${DATA.text.length}개 표시 중`;
  document.getElementById('conceptEmpty').style.display = visible === 0 ? 'block' : 'none';
}

function applyConceptFilter() {
  const q = document.getElementById('conceptSearch').value.trim().toLowerCase();
  document.querySelectorAll('#conceptCards .card').forEach(card => {
    const topicOk = conceptActiveTopic === 'all' || card.dataset.topic === conceptActiveTopic;
    const searchOk = !q || card.textContent.toLowerCase().includes(q);
    card.classList.toggle('hidden', !(topicOk && searchOk));
  });
  updateConceptStats();
}

function initConceptFilter() {
  document.getElementById('conceptFilters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('#conceptFilters .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    conceptActiveTopic = btn.dataset.topic;
    applyConceptFilter();
  });
  document.getElementById('conceptSearch').addEventListener('input', applyConceptFilter);
}

function updateChampStats() {
  const visible = document.querySelectorAll('#champCards .champ-card:not(.hidden)').length;
  document.getElementById('champStats').innerHTML = `<span>${visible}</span> / ${DATA.champ.length}명 표시 중`;
  document.getElementById('champEmpty').style.display = visible === 0 ? 'block' : 'none';
}

function applyChampFilter() {
  const q = document.getElementById('champSearch').value.trim().toLowerCase();
  document.querySelectorAll('#champCards .champ-card').forEach(card => {
    const champOk = champActiveFilter === 'all' || card.dataset.champ === champActiveFilter;
    const searchOk = !q || card.textContent.toLowerCase().includes(q);
    card.classList.toggle('hidden', !(champOk && searchOk));
  });
  updateChampStats();
}

function initChampFilter() {
  document.getElementById('champFilters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('#champFilters .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    champActiveFilter = btn.dataset.champ;
    applyChampFilter();
  });
  document.getElementById('champSearch').addEventListener('input', applyChampFilter);
}

// ─── 모달 열기/닫기 ───
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ─── 비밀번호 ───
document.getElementById('adminToggle').addEventListener('click', () => {
  if (adminMode) {
    adminMode = false;
    document.body.classList.remove('admin-mode');
    document.getElementById('adminToggle').classList.remove('active');
  } else {
    openModal('pwModal');
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  }
});

function tryLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PASSWORD) {
    closeModal('pwModal');
    document.getElementById('pwInput').value = '';
    document.getElementById('pwError').style.display = 'none';
    adminMode = true;
    document.body.classList.add('admin-mode');
    document.getElementById('adminToggle').classList.add('active');
  } else {
    document.getElementById('pwError').style.display = 'block';
  }
}

document.getElementById('pwConfirm').addEventListener('click', tryLogin);
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
document.getElementById('pwModalClose').addEventListener('click', () => closeModal('pwModal'));

// ─── 개념 카드 이벤트 (수정/삭제/추가) ───
document.getElementById('conceptCards').addEventListener('click', e => {
  if (!adminMode) return;
  const editBtn = e.target.closest('.card-edit-btn');
  const delBtn = e.target.closest('.card-del-btn');
  if (editBtn) {
    const i = parseInt(editBtn.dataset.idx);
    editTarget = { type: 'concept', index: i };
    const item = DATA.text[i];
    document.getElementById('f-topic').value = item['주제'];
    document.getElementById('f-title').value = item['핵심내용'];
    document.getElementById('f-desc').value = item['세부설명'];
    document.getElementById('conceptModalTitle').textContent = '📋 개념 수정';
    openModal('conceptModal');
  }
  if (delBtn) {
    const i = parseInt(delBtn.dataset.idx);
    if (confirm(`"${DATA.text[i]['핵심내용']}" 를 삭제할까요?`)) {
      DATA.text.splice(i, 1);
      renderConcepts();
      saveToGitHub();
    }
  }
});

// 개념 추가 버튼 (관리자 모드일 때만)
document.getElementById('tab-concepts').addEventListener('click', e => {
  if (e.target.id === 'addConceptBtn') {
    editTarget = { type: 'concept', index: null };
    document.getElementById('f-topic').value = '';
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('conceptModalTitle').textContent = '📋 개념 추가';
    openModal('conceptModal');
  }
});

document.getElementById('conceptModalSave').addEventListener('click', () => {
  const topic = document.getElementById('f-topic').value.trim();
  const title = document.getElementById('f-title').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  if (!topic || !title) return alert('주제와 핵심내용을 입력해 주세요');
  const item = { '주제': topic, '핵심내용': title, '세부설명': desc };
  if (editTarget.index !== null) {
    DATA.text[editTarget.index] = item;
  } else {
    DATA.text.push(item);
  }
  closeModal('conceptModal');
  renderConcepts();
  saveToGitHub();
});

document.getElementById('conceptModalCancel').addEventListener('click', () => closeModal('conceptModal'));

// ─── 관리자 모드 추가 버튼 주입 ───
function injectAdminAddButtons() {
  // 개념 탭 추가 버튼
  const conceptTab = document.getElementById('tab-concepts');
  const addConceptBtn = document.createElement('button');
  addConceptBtn.id = 'addConceptBtn';
  addConceptBtn.className = 'btn btn-primary';
  addConceptBtn.style.cssText = 'display:none;margin-bottom:16px;';
  addConceptBtn.textContent = '+ 개념 추가';
  conceptTab.insertBefore(addConceptBtn, conceptTab.firstChild);

  // 챔피언 탭 추가 버튼
  const champTab = document.getElementById('tab-champs');
  const addChampBtn = document.createElement('button');
  addChampBtn.id = 'addChampBtn';
  addChampBtn.className = 'btn btn-primary';
  addChampBtn.style.cssText = 'display:none;margin-bottom:16px;';
  addChampBtn.textContent = '+ 챔피언 추가';
  champTab.insertBefore(addChampBtn, champTab.firstChild);
  addChampBtn.addEventListener('click', () => {
    editTarget = { type: 'champ', index: null };
    ['f-champ-name','f-champ-icon','f-champ-image','f-champ-combo','f-champ-tips'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('champModalTitle').textContent = '🏹 챔피언 추가';
    openModal('champModal');
  });

  // 서포터 탭 추가 버튼
  const supTab = document.getElementById('tab-sup');
  const addSupBtn = document.createElement('button');
  addSupBtn.id = 'addSupBtn';
  addSupBtn.className = 'btn btn-primary';
  addSupBtn.style.cssText = 'display:none;margin-bottom:16px;';
  addSupBtn.textContent = '+ 서포터 추가';
  supTab.insertBefore(addSupBtn, supTab.querySelector('.section-label').nextSibling);
  addSupBtn.addEventListener('click', () => {
    editTarget = { type: 'sup', index: null };
    document.getElementById('f-sup-name').value = '';
    document.getElementById('f-sup-content').value = '';
    document.getElementById('supModalTitle').textContent = '🛡️ 서포터 추가';
    openModal('supModal');
  });

  // 관리자 모드 ON/OFF 시 추가 버튼 표시
  const observer = new MutationObserver(() => {
    const isAdmin = document.body.classList.contains('admin-mode');
    [addConceptBtn, addChampBtn, addSupBtn].forEach(btn => {
      btn.style.display = isAdmin ? 'inline-block' : 'none';
    });
  });
  observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
}

// ─── 초기화 ───
renderConcepts();
renderChamps();
renderSup();
injectAdminAddButtons();
