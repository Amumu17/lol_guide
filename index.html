<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바텀 라인전 고수 노트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #0f1318;
    --surface2: #151a22;
    --border: #1e2530;
    --gold: #c8aa6e;
    --gold-dim: #785a28;
    --blue: #0ac8b9;
    --blue-dim: #0a6e68;
    --text: #d4c4a0;
    --text-dim: #7a7060;
    --text-muted: #4a4840;
    --red: #e84057;
    --green: #3ac85a;
    --purple: #9f6ef5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(180deg, #060810 0%, #0a0c10 100%);
    border-bottom: 1px solid var(--gold-dim);
    padding: 28px 0 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .emblem {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.04em;
  }

  .header-text p {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ─── TABS ─── */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: none;
  }

  .tab {
    padding: 10px 22px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* ─── MAIN ─── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ─── SEARCH & FILTER ─── */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 340px;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 9px 12px 9px 36px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--gold-dim); }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }

  .filter-btn:hover {
    border-color: var(--gold-dim);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--gold-dim);
    border-color: var(--gold-dim);
    color: var(--gold);
    font-weight: 500;
  }

  /* ─── STATS BAR ─── */
  .stats-bar {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 16px;
    letter-spacing: 0.04em;
  }

  .stats-bar span {
    color: var(--gold);
    font-weight: 500;
  }

  /* ─── CARDS GRID ─── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 18px;
    transition: border-color 0.2s, transform 0.15s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--topic-color, var(--gold-dim));
    border-radius: 6px 0 0 6px;
  }

  .card:hover {
    border-color: var(--gold-dim);
    transform: translateY(-1px);
  }

  .card-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--topic-color, var(--gold));
    background: color-mix(in srgb, var(--topic-color, var(--gold)) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--topic-color, var(--gold)) 30%, transparent);
    padding: 2px 8px;
    border-radius: 3px;
    margin-bottom: 9px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: #e8dcc0;
    margin-bottom: 7px;
    line-height: 1.3;
  }

  .card-desc {
    font-size: 13px;
    color: #8a8070;
    line-height: 1.65;
    white-space: pre-line;
  }

  .card.hidden { display: none; }

  /* ─── TOPIC COLOR MAP ─── */
  .topic-딜교환 { --topic-color: #e84057; }
  .topic-라인전 { --topic-color: #c8aa6e; }
  .topic-레벨관리 { --topic-color: #3ac85a; }
  .topic-매치업 { --topic-color: #9f6ef5; }
  .topic-미니언관리 { --topic-color: #0ac8b9; }
  .topic-생존 { --topic-color: #e84057; }
  .topic-서포터운영 { --topic-color: #3ac85a; }
  .topic-스킬활용 { --topic-color: #9f6ef5; }
  .topic-시야 { --topic-color: #0ac8b9; }
  .topic-오브젝트 { --topic-color: #c8aa6e; }
  .topic-운영 { --topic-color: #c8aa6e; }
  .topic-정글의식 { --topic-color: #f0a050; }
  .topic-정보은닉 { --topic-color: #9f6ef5; }
  .topic-챔피언활용 { --topic-color: #e84057; }
  .topic-포지셔닝 { --topic-color: #0ac8b9; }
  .topic-포탑 { --topic-color: #f0a050; }
  .topic-심리전 { --topic-color: #9f6ef5; }

  /* ─── IMAGE TAB ─── */
  .image-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .image-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .image-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .image-card:hover { border-color: var(--blue-dim); }

  .image-placeholder {
    background: var(--surface2);
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
  }

  .image-card-body {
    padding: 14px 16px;
  }

  .image-card-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .image-card-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    white-space: pre-line;
  }

  .image-card-extra {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--gold);
    white-space: pre-line;
    line-height: 1.55;
  }

  /* ─── CHAMP TAB ─── */
  .champ-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .champ-header {
    background: var(--surface2);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .champ-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .champ-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--gold);
  }

  .champ-body {
    padding: 18px 20px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 16px 24px;
  }

  .champ-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding-top: 2px;
    white-space: nowrap;
  }

  .combo-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .combo-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 9px;
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.05em;
    font-family: 'Courier New', monospace;
  }

  .tip-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.65;
    white-space: pre-line;
  }

  /* ─── SUP TAB ─── */
  .sup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    border-radius: 6px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }

  .sup-champ {
    font-size: 15px;
    font-weight: 700;
    color: var(--red);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sup-champ::before {
    content: '상대';
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    background: color-mix(in srgb, var(--red) 15%, transparent);
    border: 1px solid color-mix(in srgb, var(--red) 30%, transparent);
    color: var(--red);
    padding: 2px 7px;
    border-radius: 3px;
  }

  .sup-content {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
    white-space: pre-line;
  }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .empty-state .icon { font-size: 32px; margin-bottom: 12px; }

  /* ─── DIVIDER ─── */
  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="emblem">⚔️</div>
      <div class="header-text">
        <h1>바텀 라인전 고수 노트</h1>
        <p>League of Legends · ADC &amp; Support · Bottom Lane</p>
      </div>
    </div>
    <nav class="tabs">
      <div class="tab active" data-tab="concepts">📋 개념 정리</div>
      <div class="tab" data-tab="images">🗺️ 포지셔닝 메모</div>
      <div class="tab" data-tab="champs">🏹 챔피언별 팁</div>
      <div class="tab" data-tab="sup">🛡️ 상대 서포터 대응</div>
    </nav>
  </div>
</header>

<main>

  <!-- ───────── TAB 1: 개념 정리 ───────── -->
  <div class="tab-content active" id="tab-concepts">
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="conceptSearch" type="text" placeholder="개념 검색...">
      </div>
      <div class="filters" id="conceptFilters"></div>
    </div>
    <div class="stats-bar" id="conceptStats"></div>
    <div class="cards-grid" id="conceptCards"></div>
    <div class="empty-state" id="conceptEmpty" style="display:none">
      <div class="icon">🔎</div>
      검색 결과가 없습니다
    </div>
  </div>

  <!-- ───────── TAB 2: 이미지 메모 ───────── -->
  <div class="tab-content" id="tab-images">
    <div class="image-section-title">포지셔닝 &amp; 와드 위치 메모</div>
    <div class="image-cards" id="imageCards"></div>
  </div>

  <!-- ───────── TAB 3: 챔피언 ───────── -->
  <div class="tab-content" id="tab-champs">
    <div id="champBlocks"></div>
  </div>

  <!-- ───────── TAB 4: 상대 서포터 ───────── -->
  <div class="tab-content" id="tab-sup">
    <div class="image-section-title">상대 서포터 대응법</div>
    <div id="supCards"></div>
  </div>

</main>

    {"주제":"딜교환","핵심내용":"지속 교전 가치 계산","세부설명":"스킬이 빠졌더라도 평타와 치속 등 지속 화력이 강하면 교전을 이어가는 것을 고려한다."},

// HELPERS
// ═══════════════════════════════════════
function topicClass(topic) {
  return 'topic-' + topic.replace(/\s+/g, '');
}

// ═══════════════════════════════════════
// CONCEPT CARDS
// ═══════════════════════════════════════
(function buildConcepts() {
  const topics = [...new Set(DATA.text.map(d => d['주제']))];
  const filtersEl = document.getElementById('conceptFilters');
  const cardsEl = document.getElementById('conceptCards');
  const statsEl = document.getElementById('conceptStats');
  const searchEl = document.getElementById('conceptSearch');
  const emptyEl = document.getElementById('conceptEmpty');
  let activeTopic = 'all';

  // Build filter buttons
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = '전체';
  allBtn.dataset.topic = 'all';
  filtersEl.appendChild(allBtn);

  topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = t;
    btn.dataset.topic = t;
    filtersEl.appendChild(btn);
  });

  // Build cards
  DATA.text.forEach((item, i) => {
    const card = document.createElement('div');
    const tc = topicClass(item['주제']);
    card.className = `card ${tc}`;
    card.dataset.topic = item['주제'];
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="card-tag">${item['주제']}</div>
      <div class="card-title">${item['핵심내용']}</div>
      <div class="card-desc">${item['세부설명']}</div>
    `;
    cardsEl.appendChild(card);
  });

  function updateStats() {
    const visible = cardsEl.querySelectorAll('.card:not(.hidden)').length;
    statsEl.innerHTML = `<span>${visible}</span> / ${DATA.text.length}개 표시 중`;
    emptyEl.style.display = visible === 0 ? 'block' : 'none';
  }

  function applyFilters() {
    const query = searchEl.value.trim().toLowerCase();
    cardsEl.querySelectorAll('.card').forEach(card => {
      const topic = card.dataset.topic;
      const text = card.textContent.toLowerCase();
      const topicOk = activeTopic === 'all' || topic === activeTopic;
      const searchOk = !query || text.includes(query);
      card.classList.toggle('hidden', !(topicOk && searchOk));
    });
    updateStats();
  }

  filtersEl.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTopic = btn.dataset.topic;
    applyFilters();
  });

  searchEl.addEventListener('input', applyFilters);

  updateStats();
})();

(function buildImages() {

    card.className = 'image-card';
    card.innerHTML = `

      <div class="image-card-body">
        <div class="image-card-label">${item['핵심내용']}</div>
        <div class="image-card-desc">${item['설명']}</div>
        ${item['추가설명'] ? `<div class="image-card-extra">💡 ${item['추가설명']}</div>` : ''}

})();

      ? champ.combo.map(c => `<span class="combo-badge">${c}</span>`).join('')
      : '<span style="color:var(--text-muted);font-size:13px">-</span>';

    const tipsHTML = champ.tips.map(t => `<div class="tip-text" style="margin-bottom:8px">• ${t}</div>`).join('');

    block.innerHTML = `
      <div class="champ-header">
        <div class="champ-icon">${champ.icon}</div>
        <div class="champ-name">${champ.name}</div>
      </div>
      <div class="champ-body">
        <div class="champ-label">콤보 순서</div>
        <div class="combo-badges">${comboBadges}</div>
        <div class="champ-label">꿀팁</div>
        <div>${tipsHTML}</div>
      </div>
    `;
    el.appendChild(block);
  });
})();

// ═══════════════════════════════════════
// SUP CARDS
// ═══════════════════════════════════════
(function buildSup() {
  const el = document.getElementById('supCards');
  DATA.sup.forEach(item => {
    const card = document.createElement('div');
    card.className = 'sup-card';
    card.innerHTML = `
      <div class="sup-champ">${item['상대법']}</div>
      <div class="sup-content">${item['내용']}</div>
    `;
    el.appendChild(card);
  });
})();

// ═══════════════════════════════════════
// TAB NAVIGATION
// ═══════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});
</script>
</body>
