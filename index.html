<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리그오브레전드 공책</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  :root {
    /* ─ base (dark navy) ─ */
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --surface3: #242c3d;
    --border: #2a3142;
    --border-strong: #3a4356;
    --text: #e6edf3;
    --text-dim: #b6bfcc;
    --text-muted: #8b949e;

    /* ─ brand / hero ─ */
    --hero-start: #26305c;
    --hero-end: #0d1117;
    --hero-deep: #05070c;
    --primary: #4f8cff;
    --primary-dark: #3569d6;
    --primary-light: rgba(79,140,255,0.16);

    /* ─ accent palette (translucent, dark-mode friendly) ─ */
    --red: #f85149;      --red-bg: rgba(248,81,73,0.16);
    --amber: #e3b341;    --amber-bg: rgba(227,179,65,0.16);
    --green: #3fb950;    --green-bg: rgba(63,185,80,0.16);
    --violet: #a371f7;   --violet-bg: rgba(163,113,247,0.16);
    --teal: #39c5cf;     --teal-bg: rgba(57,197,207,0.16);
    --orange: #ffa657;   --orange-bg: rgba(255,166,87,0.16);
    --blue: #4f8cff;     --blue-light: rgba(79,140,255,0.16);

    --shadow-xs: 0 1px 2px rgba(0,0,0,0.35);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.35), 0 4px 14px rgba(0,0,0,0.25);
    --shadow-md: 0 8px 22px rgba(0,0,0,0.45);
    --shadow-lg: 0 20px 48px rgba(0,0,0,0.55);
    --shadow-hero: 0 20px 48px rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── HEADER / HERO ─── */
  header {
    background: var(--bg);
    padding: 20px 0 0;
    position: relative;
    z-index: 100;
  }
  .header-inner { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

  .header-top {
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: linear-gradient(135deg, var(--hero-start), var(--hero-deep) 120%);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 22px 24px 24px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-hero);
    position: relative;
    overflow: hidden;
  }
  .header-top::after {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(79,140,255,0.18), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .hero-row { display: flex; align-items: center; gap: 14px; position: relative; z-index: 1; }
  .emblem {
    width: 46px; height: 46px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 21px; flex-shrink: 0;
  }
  .header-text h1 { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: -0.01em; }
  .header-text p { font-size: 11px; color: rgba(230,237,243,0.62); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }

  .hero-stats { display: flex; gap: 8px; position: relative; z-index: 1; }
  .hero-stat {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 9px 12px;
    color: #fff;
  }
  .hero-stat b { display: block; font-size: 17px; font-weight: 900; line-height: 1.2; }
  .hero-stat span { font-size: 10px; color: rgba(230,237,243,0.6); letter-spacing: 0.03em; }

  /* ─── TABS (segmented pill) ─── */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px;
    box-shadow: var(--shadow-sm);
    position: sticky;
    top: 12px;
    z-index: 99;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 8px;
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text-muted);
    border-radius: 999px;
    transition: all 0.18s;
    white-space: nowrap;
    user-select: none;
  }
  .tab:hover { color: var(--text-dim); background: var(--surface2); }
  .tab.active { color: #fff; background: var(--primary); box-shadow: 0 6px 14px rgba(79,140,255,0.35); }

  /* ─── ADMIN BUTTON ─── */
  .admin-toggle {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    box-shadow: var(--shadow-lg); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all 0.18s;
  }
  .admin-toggle:hover { background: var(--primary); border-color: var(--primary); transform: translateY(-2px); }
  .admin-toggle.active { background: var(--primary); border-color: var(--primary); }

  /* ─── MODAL ─── */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 300;
    align-items: center; justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 26px;
    padding: 26px; width: 90%; max-width: 520px;
    box-shadow: var(--shadow-lg);
    max-height: 85vh; overflow-y: auto;
    border: 1px solid var(--border);
  }
  .modal-title {
    font-size: 16px; font-weight: 800; color: var(--text);
    margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
  .modal-close {
    margin-left: auto; background: var(--surface2); border: none;
    cursor: pointer; font-size: 15px; color: var(--text-muted);
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--surface3); color: var(--text-dim); }

  /* ─── FORM ─── */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 11px 15px; color: var(--text);
    font-size: 13px; font-family: inherit; outline: none;
    transition: border-color 0.18s, background 0.18s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--primary); background: var(--surface3);
  }
  .form-textarea { resize: vertical; min-height: 80px; border-radius: 16px; }
  .form-select { cursor: pointer; }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }

  .btn {
    padding: 10px 20px; border-radius: 999px; border: none;
    font-size: 13px; font-weight: 700; font-family: inherit;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-danger { background: var(--red-bg); color: var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text-dim); border: 1.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
  .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; flex-wrap: wrap; }

  /* ─── DYNAMIC LIST FIELDS (콤보/꿀팁/대응법 여러개 입력) ─── */
  .dynamic-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .dyn-row { display: flex; gap: 8px; align-items: center; }
  .dyn-input { flex: 1; }
  .dyn-remove {
    flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-muted); cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }
  .dyn-remove:hover { background: var(--red-bg); color: var(--red); border-color: var(--red-bg); }
  .dyn-empty { font-size: 12px; color: var(--text-muted); padding: 6px 2px 10px; }
  .btn-add-field {
    padding: 9px 16px; border-radius: 999px; border: 1.5px dashed var(--border-strong);
    background: transparent; color: var(--text-dim); font-size: 12px; font-weight: 700;
    cursor: pointer; width: 100%; font-family: inherit; transition: all 0.15s;
  }
  .btn-add-field:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

  /* ─── PASSWORD SCREEN ─── */
  .pw-screen { text-align: center; padding: 10px 0 4px; }
  .pw-screen p { font-size: 13px; color: var(--text-dim); margin-bottom: 14px; }
  .pw-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; font-weight: 600; }

  /* ─── SAVING INDICATOR ─── */
  .save-indicator {
    display: none; position: fixed; top: 20px; right: 24px; z-index: 400;
    background: var(--surface3); color: var(--text); font-size: 12px; font-weight: 700;
    padding: 10px 18px; border-radius: 999px; box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
  }
  .save-indicator.show { display: block; }
  .save-indicator.success { background: var(--green); color: #06240f; border-color: var(--green); }
  .save-indicator.error { background: var(--red); color: #2a0705; border-color: var(--red); }

  /* ─── MAIN CONTENT ─── */
  main { max-width: 1100px; margin: 0 auto; padding: 22px 20px 60px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
  .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; pointer-events: none; }
  .search-input {
    width: 100%; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 999px; padding: 10px 16px 10px 38px; color: var(--text);
    font-size: 13px; font-family: inherit; outline: none;
    transition: border-color 0.18s; box-shadow: var(--shadow-xs);
  }
  .search-input:focus { border-color: var(--primary); }
  .search-input::placeholder { color: var(--text-muted); }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 7px 14px; border-radius: 999px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text-dim); font-size: 12px;
    font-family: inherit; font-weight: 600; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; box-shadow: var(--shadow-xs);
  }
  .filter-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .filter-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

  .stats-bar { font-size: 11.5px; color: var(--text-muted); margin-bottom: 16px; padding-left: 2px; }
  .stats-bar span { color: var(--primary); font-weight: 800; }

  /* ─── CONCEPT CARDS ─── */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 20px;
    transition: box-shadow 0.2s, transform 0.18s, border-color 0.18s;
    position: relative; overflow: hidden; box-shadow: var(--shadow-sm);
  }
  .card:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); border-color: var(--border-strong); }
  .card.hidden { display: none; }

  .card-tag {
    display: inline-block; font-size: 10.5px; font-weight: 800;
    letter-spacing: 0.03em;
    color: var(--topic-color, var(--primary));
    background: var(--topic-bg, var(--primary-light));
    border-radius: 999px; padding: 4px 11px; margin-bottom: 11px;
  }
  .card-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 7px; line-height: 1.35; }
  .card-desc { font-size: 13px; color: var(--text-dim); line-height: 1.7; white-space: pre-line; }

  .card-admin-btns {
    display: none; gap: 6px; margin-top: 14px; padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  body.admin-mode .card-admin-btns { display: flex; }
  .card-edit-btn { font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); cursor: pointer; font-family: inherit; }
  .card-edit-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .card-del-btn { font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 999px; border: 1px solid var(--red-bg); background: var(--red-bg); color: var(--red); cursor: pointer; font-family: inherit; }
  .card-del-btn:hover { background: var(--red); color: #fff; }

  /* ─── TOPIC COLORS (muted, reused) ─── */
  .topic-딜교환    { --topic-color: var(--red);    --topic-bg: var(--red-bg); }
  .topic-라인전    { --topic-color: var(--amber);  --topic-bg: var(--amber-bg); }
  .topic-레벨관리  { --topic-color: var(--green);  --topic-bg: var(--green-bg); }
  .topic-매치업    { --topic-color: var(--violet); --topic-bg: var(--violet-bg); }
  .topic-미니언관리 { --topic-color: var(--teal);   --topic-bg: var(--teal-bg); }
  .topic-생존      { --topic-color: var(--red);    --topic-bg: var(--red-bg); }
  .topic-서포터운영 { --topic-color: var(--green);  --topic-bg: var(--green-bg); }
  .topic-스킬활용  { --topic-color: var(--violet); --topic-bg: var(--violet-bg); }
  .topic-시야      { --topic-color: var(--teal);   --topic-bg: var(--teal-bg); }
  .topic-오브젝트  { --topic-color: var(--amber);  --topic-bg: var(--amber-bg); }
  .topic-운영      { --topic-color: var(--amber);  --topic-bg: var(--amber-bg); }
  .topic-정글의식  { --topic-color: var(--orange); --topic-bg: var(--orange-bg); }
  .topic-정보은닉  { --topic-color: var(--violet); --topic-bg: var(--violet-bg); }
  .topic-챔피언활용 { --topic-color: var(--red);    --topic-bg: var(--red-bg); }
  .topic-포지셔닝  { --topic-color: var(--blue);   --topic-bg: var(--blue-light); }
  .topic-포탑      { --topic-color: var(--orange); --topic-bg: var(--orange-bg); }
  .topic-심리전    { --topic-color: var(--violet); --topic-bg: var(--violet-bg); }

  /* ─── PROFILE CARDS (챔피언별 팁 + 챔피언 상대법 공용) ─── */
  .profile-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 22px; margin-bottom: 16px; overflow: hidden;
    box-shadow: var(--shadow-sm); transition: box-shadow 0.2s, transform 0.18s;
  }
  .profile-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .profile-card.hidden { display: none; }
  .profile-header {
    background: var(--surface2); padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid var(--border);
  }
  .profile-img-wrap {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--primary-light); box-shadow: 0 0 0 3px var(--surface2), 0 0 0 4px var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0; overflow: hidden;
  }
  .profile-img-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .profile-name { font-size: 16px; font-weight: 800; color: var(--text); }
  .profile-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .profile-body { padding: 18px 20px; }
  .profile-section { margin-bottom: 16px; }
  .profile-section:last-child { margin-bottom: 0; }
  .profile-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 9px; }

  .combo-set { margin-bottom: 10px; }
  .combo-set:last-child { margin-bottom: 0; }
  .combo-set-label { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; font-weight: 700; }
  .combo-badges { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .combo-badge { background: var(--primary-light); border-radius: 10px; padding: 5px 12px; font-size: 13px; font-weight: 800; color: var(--primary); }
  .combo-arrow { color: var(--text-muted); font-size: 12px; }

  .tip-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 13px; background: var(--surface2); border-radius: 13px; margin-bottom: 6px; font-size: 13px; color: var(--text-dim); line-height: 1.65; white-space: pre-line; }
  .tip-item:last-child { margin-bottom: 0; }
  .tip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); flex-shrink: 0; margin-top: 6px; }
  .tip-dot-counter { background: var(--red); }

  .profile-admin-btns {
    display: none; gap: 6px; margin-top: 12px; padding: 14px 20px;
    border-top: 1px solid var(--border);
  }
  body.admin-mode .profile-admin-btns { display: flex; }

  /* ─── SECTION LABEL ─── */
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1.5px solid var(--border); }

  /* ─── ADMIN MODE BANNER ─── */
  .admin-banner {
    display: none; background: var(--primary-light); color: var(--primary);
    text-align: center; font-size: 12px; font-weight: 700;
    padding: 9px; letter-spacing: 0.02em;
  }
  body.admin-mode .admin-banner { display: block; }

  /* ─── EMPTY STATE ─── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 13px; }
  .empty-state .icon { font-size: 32px; margin-bottom: 10px; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
</style>
</head>
<body>

<!-- 관리자 모드 배너 -->
<div class="admin-banner">🔧 관리자 모드 활성화 — 각 카드에서 수정·삭제할 수 있어요</div>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="hero-row">
        <div class="header-text">
          <h1>리그오브레전드 공책</h1>
          <p>League of Legends · ADC &amp; Support · Bottom Lane</p>
        </div>
      </div>
      <div class="hero-stats" id="heroStats"></div>
    </div>
    <nav class="tabs">
      <div class="tab active" data-tab="concepts">📋 개념 정리</div>
      <div class="tab" data-tab="champs">🏹 원딜</div>
      <div class="tab" data-tab="sup">🛡️ 서폿</div>
    </nav>
  </div>
</header>

<main>
  <!-- TAB 1 -->
  <div class="tab-content active" id="tab-concepts">
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="conceptSearch" type="text" placeholder="개념 검색...">
      </div>
      <div class="filters" id="conceptFilters"></div>
    </div>
    <div class="stats-bar" id="conceptStats"></div>
    <div class="cards-grid" id="conceptCards"></div>
    <div class="empty-state" id="conceptEmpty" style="display:none">
      <div class="icon">🔎</div>검색 결과가 없습니다
    </div>
  </div>

  <!-- TAB 2 -->
  <div class="tab-content" id="tab-champs">
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="champSearch" type="text" placeholder="챔피언 검색...">
      </div>
      <div class="filters" id="champFilters"></div>
    </div>
    <div class="stats-bar" id="champStats"></div>
    <div id="champCards"></div>
    <div class="empty-state" id="champEmpty" style="display:none">
      <div class="icon">🔎</div>검색 결과가 없습니다
    </div>
  </div>

  <!-- TAB 3 -->
  <div class="tab-content" id="tab-sup">
    <div class="section-label">서폿</div>
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="supSearch" type="text" placeholder="챔피언 검색...">
      </div>
      <div class="filters" id="supFilters"></div>
    </div>
    <div class="stats-bar" id="supStats"></div>

// ─── GitHub에 저장 ───
async function saveToGitHub() {
  if (!sessionToken) {
    showSave('❌ 로그인이 필요합니다', 'error');
    return;
  }
  showSave('⏳ 저장 중...');
  try {
    const infoRes = await fetch(
      `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.file}`,
      { headers: { Authorization: `token ${sessionToken}` } }
    );
    if (!infoRes.ok) {
      if (infoRes.status === 401) showSave('❌ 토큰이 유효하지 않습니다', 'error');
      else if (infoRes.status === 404) showSave('❌ 저장소/파일을 찾을 수 없습니다', 'error');
      else showSave(`❌ 오류 (${infoRes.status})`, 'error');
      return;
    }
    const info = await infoRes.json();
    const sha = info.sha;

    const currentHTML = await fetch(location.href + '?nocache=' + Date.now()).then(r => r.text());
    const newDataStr = 'let DATA = ' + JSON.stringify(DATA, null, 2) + ';';
    const updated = currentHTML.replace(/let DATA = \{[\s\S]*?\};\n\n/, newDataStr + '\n\n');

    const encoded = btoa(unescape(encodeURIComponent(updated)));

    const putRes = await fetch(
      `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.file}`,
      {
        method: 'PUT',
        headers: {
          Authorization: `token ${sessionToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: '데이터 업데이트',
          content: encoded,
          sha: sha,
          branch: GITHUB_CONFIG.branch
        })
      }
    );

    if (putRes.ok) {
      showSave('✅ 저장 완료! (1~2분 후 반영)', 'success');
    } else {
      showSave('❌ 저장 실패', 'error');
    }
  } catch(e) {
    showSave('❌ 오류 발생: ' + e.message, 'error');
  }
}

// ─── 프로필 카드 공용 빌더 (챔피언별 팁 / 챔피언 상대법) ───
function buildProfileCardHTML(item, i, showCombos) {
  const imgHTML = item.image
    ? `<img src="${item.image}" alt="${item.name}">`
    : `<span>${item.icon || (showCombos ? '🏹' : '🛡️')}</span>`;

  const combos = item.combos || [];
  const combosHTML = (showCombos && combos.length)
    ? combos.map((combo, ci) => `
        <div class="combo-set">
          ${combos.length > 1 ? `<div class="combo-set-label">콤보 ${ci+1}</div>` : ''}
          <div class="combo-badges">${combo.map((c, ii) =>
            `<span class="combo-badge">${c}</span>${ii < combo.length-1 ? '<span class="combo-arrow">→</span>' : ''}`
          ).join('')}</div>
        </div>`).join('')
    : '';

  const tips = item.tips || [];
  const tipsHTML = tips.length
    ? tips.map(t => `<div class="tip-item"><div class="tip-dot"></div><div>${t}</div></div>`).join('')
    : `<div class="dyn-empty">아직 등록된 내용이 없습니다</div>`;

  const counters = item.counters || [];
  const countersHTML = counters.length
    ? counters.map(c => `<div class="tip-item"><div class="tip-dot tip-dot-counter"></div><div>${c}</div></div>`).join('')
    : `<div class="dyn-empty">아직 등록된 내용이 없습니다</div>`;

  const subLabel = showCombos ? `꿀팁 ${tips.length} · 카운터 ${counters.length}` : `대응법 · ${tips.length}개`;

  return `
    <div class="profile-header">
      <div class="profile-img-wrap">${imgHTML}</div>
      <div>
        <div class="profile-name">${item.name}</div>
        <div class="profile-sub">${subLabel}</div>
      </div>
    </div>
    <div class="profile-body">
      ${combosHTML ? `<div class="profile-section"><div class="profile-label">콤보 순서</div>${combosHTML}</div>` : ''}
      <div class="profile-section"><div class="profile-label">${showCombos ? '꿀팁' : '대응법'}</div>${tipsHTML}</div>
      ${showCombos ? `<div class="profile-section"><div class="profile-label">카운터</div>${countersHTML}</div>` : ''}
    </div>
    <div class="profile-admin-btns">
      <button class="card-edit-btn" data-idx="${i}">✏️ 수정</button>
      <button class="card-del-btn" data-idx="${i}">🗑 삭제</button>
    </div>`;
}

function applyConceptFilter() {
  const q = document.getElementById('conceptSearch').value.trim().toLowerCase();
  document.querySelectorAll('#conceptCards .card').forEach(card => {
    const topicOk = conceptActiveTopic === 'all' || card.dataset.topic === conceptActiveTopic;
    const searchOk = !q || card.textContent.toLowerCase().includes(q);
    card.classList.toggle('hidden', !(topicOk && searchOk));
  });
  updateConceptStats();
}

  document.getElementById('conceptFilters').addEventListener('click', e => {

    btn.classList.add('active');

    applyConceptFilter();

    row.className = 'dyn-row';
    const input = document.createElement('input');
    input.className = 'form-input dyn-input';
    input.placeholder = '내용을 입력하세요';
    input.value = val;
    input.addEventListener('input', () => { arr[idx] = input.value; });
    const rm = document.createElement('button');
    rm.type = 'button';
    rm.className = 'dyn-remove';
    rm.textContent = '✕';
    rm.addEventListener('click', () => { arr.splice(idx, 1); renderTextListRows(containerId, arr); });
    row.appendChild(input);
    row.appendChild(rm);
    el.appendChild(row);
  });
}

function renderComboListRows() {
  const el = document.getElementById('comboList');
  el.innerHTML = '';
  if (!champCombosDraft.length) {
    const empty = document.createElement('div');
    empty.className = 'dyn-empty';
    empty.textContent = '아직 콤보가 없습니다. 아래 버튼으로 추가해 주세요.';
    el.appendChild(empty);
  }
  champCombosDraft.forEach((combo, idx) => {
    const row = document.createElement('div');
    row.className = 'dyn-row';
    const input = document.createElement('input');
    input.className = 'form-input dyn-input';
    input.placeholder = '예: R, 평, E, 평, W, Q';
    input.value = combo.join(', ');
    input.addEventListener('input', () => {
      champCombosDraft[idx] = input.value.split(',').map(s => s.trim()).filter(Boolean);
    });
    const rm = document.createElement('button');
    rm.type = 'button';
    rm.className = 'dyn-remove';
    rm.textContent = '✕';
    rm.addEventListener('click', () => { champCombosDraft.splice(idx, 1); renderComboListRows(); });
    row.appendChild(input);
    row.appendChild(rm);
    el.appendChild(row);
  });
}

document.getElementById('addComboRowBtn').addEventListener('click', () => {
  champCombosDraft.push([]);
  renderComboListRows();
});
document.getElementById('addTipRowBtn').addEventListener('click', () => {
  champTipsDraft.push('');
  renderTextListRows('tipsList', champTipsDraft);
});
document.getElementById('addCounterRowBtn').addEventListener('click', () => {
  champCountersDraft.push('');
  renderTextListRows('counterList', champCountersDraft);
});
document.getElementById('addSupTipRowBtn').addEventListener('click', () => {
  supTipsDraft.push('');
  renderTextListRows('supTipsList', supTipsDraft);
});

// ─── 비밀번호 + 토큰 로그인 ───
document.getElementById('adminToggle').addEventListener('click', () => {
  if (adminMode) {
    adminMode = false;
    sessionToken = '';
    document.body.classList.remove('admin-mode');
    document.getElementById('adminToggle').classList.remove('active');
  } else {
    openModal('pwModal');
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  }
});

function tryLogin() {
  const pw = document.getElementById('pwInput').value;
  const token = document.getElementById('tokenInput').value.trim();
  if (pw === ADMIN_PASSWORD && token) {
    sessionToken = token;
    closeModal('pwModal');
    document.getElementById('pwInput').value = '';
    document.getElementById('tokenInput').value = '';
    document.getElementById('pwError').style.display = 'none';
    adminMode = true;
    document.body.classList.add('admin-mode');
    document.getElementById('adminToggle').classList.add('active');
  } else {
    document.getElementById('pwError').textContent = !token ? '토큰을 입력해 주세요' : '비밀번호가 틀렸습니다';
    document.getElementById('pwError').style.display = 'block';
  }
}

document.getElementById('pwConfirm').addEventListener('click', tryLogin);
document.getElementById('tokenInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('tokenInput').focus(); });
document.getElementById('pwModalClose').addEventListener('click', () => closeModal('pwModal'));

// ─── 개념 카드 이벤트 (수정/삭제/추가) ───
document.getElementById('conceptCards').addEventListener('click', e => {
  if (!adminMode) return;
  const editBtn = e.target.closest('.card-edit-btn');
  const delBtn = e.target.closest('.card-del-btn');
  if (editBtn) {
    const i = parseInt(editBtn.dataset.idx);
    editTarget = { type: 'concept', index: i };
    const item = DATA.text[i];
    document.getElementById('f-topic').value = item['주제'];
    document.getElementById('f-title').value = item['핵심내용'];
    document.getElementById('f-desc').value = item['세부설명'];
    document.getElementById('conceptModalTitle').textContent = '📋 개념 수정';
    openModal('conceptModal');
  }
  if (delBtn) {
    const i = parseInt(delBtn.dataset.idx);
    if (confirm(`"${DATA.text[i]['핵심내용']}" 를 삭제할까요?`)) {
      DATA.text.splice(i, 1);
      renderConcepts();
      renderHeroStats();
      saveToGitHub();
    }
  }
});

document.getElementById('tab-concepts').addEventListener('click', e => {
  if (e.target.id === 'addConceptBtn') {
    editTarget = { type: 'concept', index: null };
    document.getElementById('f-topic').value = '';
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('conceptModalTitle').textContent = '📋 개념 추가';
    openModal('conceptModal');
  }
});

document.getElementById('conceptModalSave').addEventListener('click', () => {
  const topic = document.getElementById('f-topic').value.trim();
  const title = document.getElementById('f-title').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  if (!topic || !title) return alert('주제와 핵심내용을 입력해 주세요');
  const item = { '주제': topic, '핵심내용': title, '세부설명': desc };
  if (editTarget.index !== null) {
    DATA.text[editTarget.index] = item;
  } else {
    DATA.text.push(item);
  }
  closeModal('conceptModal');
  renderConcepts();
  renderHeroStats();
  saveToGitHub();
});
document.getElementById('conceptModalClose').addEventListener('click', () => closeModal('conceptModal'));
document.getElementById('conceptModalCancel').addEventListener('click', () => closeModal('conceptModal'));

// ─── 챔피언 카드 이벤트 ───
document.getElementById('champCards').addEventListener('click', e => {
  if (!adminMode) return;
  const editBtn = e.target.closest('.card-edit-btn');
  const delBtn = e.target.closest('.card-del-btn');
  if (editBtn) {
    const i = parseInt(editBtn.dataset.idx);
    editTarget = { type: 'champ', index: i };
    const c = DATA.champ[i];
    document.getElementById('f-champ-name').value = c.name;
    document.getElementById('f-champ-icon').value = c.icon || '';
    document.getElementById('f-champ-image').value = c.image || '';
    champCombosDraft = (c.combos || []).map(combo => [...combo]);
    champTipsDraft = [...(c.tips || [])];
    champCountersDraft = [...(c.counters || [])];
    renderComboListRows();
    renderTextListRows('tipsList', champTipsDraft);
    renderTextListRows('counterList', champCountersDraft);
    document.getElementById('champModalTitle').textContent = '🏹 챔피언 수정';
    openModal('champModal');
  }
  if (delBtn) {
    const i = parseInt(delBtn.dataset.idx);
    if (confirm(`"${DATA.champ[i].name}" 를 삭제할까요?`)) {
      DATA.champ.splice(i, 1);
      renderChamps();
      renderHeroStats();
      saveToGitHub();
    }
  }
});

document.getElementById('champModalSave').addEventListener('click', () => {
  const name = document.getElementById('f-champ-name').value.trim();
  if (!name) return alert('챔피언 이름을 입력해 주세요');
  const item = {
    name,
    icon: document.getElementById('f-champ-icon').value.trim() || '🏹',
    image: document.getElementById('f-champ-image').value.trim() || null,
    combos: champCombosDraft.map(c => c.filter(Boolean)).filter(c => c.length > 0),
    tips: champTipsDraft.map(t => t.trim()).filter(Boolean),
    counters: champCountersDraft.map(t => t.trim()).filter(Boolean)
  };
  if (editTarget.index !== null) {
    DATA.champ[editTarget.index] = item;
  } else {
    DATA.champ.push(item);
  }
  closeModal('champModal');
  renderChamps();
  renderHeroStats();
  saveToGitHub();
});
document.getElementById('champModalClose').addEventListener('click', () => closeModal('champModal'));
document.getElementById('champModalCancel').addEventListener('click', () => closeModal('champModal'));

// ─── 상대법 카드 이벤트 ───
document.getElementById('supCards').addEventListener('click', e => {
  if (!adminMode) return;
  const editBtn = e.target.closest('.card-edit-btn');
  const delBtn = e.target.closest('.card-del-btn');

    const i = parseInt(editBtn.dataset.idx);

    const i = parseInt(delBtn.dataset.idx);
    if (confirm(`"${DATA.sup[i].name}" 를 삭제할까요?`)) {
      DATA.sup.splice(i, 1);
      renderSup();
      renderHeroStats();

  }
});

document.getElementById('supModalSave').addEventListener('click', () => {
  const name = document.getElementById('f-sup-name').value.trim();
  if (!name) return alert('챔피언 이름을 입력해 주세요');
  const item = {
    name,

  }
  closeModal('supModal');

  saveToGitHub();

document.getElementById('supModalClose').addEventListener('click', () => closeModal('supModal'));
document.getElementById('supModalCancel').addEventListener('click', () => closeModal('supModal'));

// ─── 탭 이동 ───
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ─── 관리자 모드 추가 버튼 주입 ───
function injectAdminAddButtons() {
  const conceptTab = document.getElementById('tab-concepts');
  const addConceptBtn = document.createElement('button');
  addConceptBtn.id = 'addConceptBtn';
  addConceptBtn.className = 'btn btn-primary';
  addConceptBtn.style.cssText = 'display:none;margin-bottom:16px;';
  addConceptBtn.textContent = '+ 개념 추가';
  conceptTab.insertBefore(addConceptBtn, conceptTab.firstChild);

  const champTab = document.getElementById('tab-champs');
  const addChampBtn = document.createElement('button');
  addChampBtn.id = 'addChampBtn';
  addChampBtn.className = 'btn btn-primary';
  addChampBtn.style.cssText = 'display:none;margin-bottom:16px;';
  addChampBtn.textContent = '+ 챔피언 추가';
  champTab.insertBefore(addChampBtn, champTab.firstChild);
  addChampBtn.addEventListener('click', () => {
    editTarget = { type: 'champ', index: null };
    ['f-champ-name','f-champ-icon','f-champ-image'].forEach(id => document.getElementById(id).value = '');
    champCombosDraft = [];
    champTipsDraft = [];
    champCountersDraft = [];
    renderComboListRows();
    renderTextListRows('tipsList', champTipsDraft);
    renderTextListRows('counterList', champCountersDraft);
    document.getElementById('champModalTitle').textContent = '🏹 챔피언 추가';
    openModal('champModal');
  });

  const supTab = document.getElementById('tab-sup');
  const addSupBtn = document.createElement('button');
  addSupBtn.id = 'addSupBtn';
  addSupBtn.className = 'btn btn-primary';
  addSupBtn.style.cssText = 'display:none;margin-bottom:16px;';
  addSupBtn.textContent = '+ 서폿 추가';
  supTab.insertBefore(addSupBtn, supTab.firstChild);
  addSupBtn.addEventListener('click', () => {
    editTarget = { type: 'sup', index: null };
    ['f-sup-name','f-sup-icon','f-sup-image'].forEach(id => document.getElementById(id).value = '');
    supTipsDraft = [];
    renderTextListRows('supTipsList', supTipsDraft);
    document.getElementById('supModalTitle').textContent = '🛡️ 서폿 추가';
    openModal('supModal');
  });

  const observer = new MutationObserver(() => {
    const isAdmin = document.body.classList.contains('admin-mode');
    [addConceptBtn, addChampBtn, addSupBtn].forEach(btn => {
      btn.style.display = isAdmin ? 'inline-block' : 'none';
    });
  });
  observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
}

// ─── 초기화 ───
renderConcepts();
renderChamps();
renderSup();
renderHeroStats();
injectAdminAddButtons();
</script>
