<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바텀 라인전 고수 노트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  :root {
    --bg: #f4f6fa;
    --surface: #ffffff;
    --surface2: #f0f2f7;
    --border: #e2e6ef;
    --border-hover: #c8cfe0;
    --gold: #b8860b;
    --gold-light: #f5e6b8;
    --gold-mid: #d4a820;
    --blue: #2563eb;
    --blue-light: #dbeafe;
    --text: #1e2433;
    --text-dim: #4b5675;
    --text-muted: #9099b0;
    --red: #dc2626;
    --red-light: #fee2e2;
    --green: #16a34a;
    --green-light: #dcfce7;
    --purple: #7c3aed;
    --purple-light: #ede9fe;
    --orange: #ea580c;
    --orange-light: #ffedd5;
    --teal: #0d9488;
    --teal-light: #ccfbf1;
    --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 2px 12px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 16px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    padding: 20px 0 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .emblem {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--gold-mid), #f0c040);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(180,140,0,0.25);
  }

  .header-text h1 {
    font-size: 19px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .header-text p {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  /* ─── TABS ─── */
  .tabs {
    display: flex;
    gap: 0;
  }

  .tab {
    padding: 10px 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    transition: all 0.18s;
    letter-spacing: 0.01em;
    white-space: nowrap;
    user-select: none;
  }

  .tab:hover { color: var(--text-dim); }

  .tab.active {
    color: var(--blue);
    border-bottom-color: var(--blue);
  }

  /* ─── MAIN ─── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ─── CONTROLS ─── */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 320px;
  }

  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 13px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px 9px 34px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
    box-shadow: var(--shadow);
  }

  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
  }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 13px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    box-shadow: var(--shadow);
  }

  .filter-btn:hover {
    border-color: var(--blue);
    color: var(--blue);
    background: var(--blue-light);
  }

  .filter-btn.active {
    background: var(--blue);
    border-color: var(--blue);
    color: #fff;
    font-weight: 600;
  }

  /* ─── STATS BAR ─── */
  .stats-bar {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 18px;
    letter-spacing: 0.03em;
  }

  .stats-bar span {
    color: var(--blue);
    font-weight: 700;
  }

  /* ─── CARDS GRID ─── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    transition: box-shadow 0.18s, transform 0.15s, border-color 0.18s;
    cursor: default;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--topic-color, var(--blue));
    border-radius: 10px 0 0 10px;
  }

  .card:hover {
    border-color: var(--border-hover);
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }

  .card-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--topic-color, var(--blue));
    background: var(--topic-bg, var(--blue-light));
    border-radius: 4px;
    padding: 2px 8px;
    margin-bottom: 9px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 7px;
    line-height: 1.35;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
    white-space: pre-line;
  }

  .card.hidden { display: none; }

  /* ─── TOPIC COLORS ─── */
  .topic-딜교환    { --topic-color: var(--red);    --topic-bg: var(--red-light); }
  .topic-라인전    { --topic-color: var(--gold);   --topic-bg: var(--gold-light); }
  .topic-레벨관리  { --topic-color: var(--green);  --topic-bg: var(--green-light); }
  .topic-매치업    { --topic-color: var(--purple);  --topic-bg: var(--purple-light); }
  .topic-미니언관리 { --topic-color: var(--teal);  --topic-bg: var(--teal-light); }
  .topic-생존      { --topic-color: var(--red);    --topic-bg: var(--red-light); }
  .topic-서포터운영 { --topic-color: var(--green); --topic-bg: var(--green-light); }
  .topic-스킬활용  { --topic-color: var(--purple); --topic-bg: var(--purple-light); }
  .topic-시야      { --topic-color: var(--teal);   --topic-bg: var(--teal-light); }
  .topic-오브젝트  { --topic-color: var(--gold);   --topic-bg: var(--gold-light); }
  .topic-운영      { --topic-color: var(--gold);   --topic-bg: var(--gold-light); }
  .topic-정글의식  { --topic-color: var(--orange); --topic-bg: var(--orange-light); }
  .topic-정보은닉  { --topic-color: var(--purple); --topic-bg: var(--purple-light); }
  .topic-챔피언활용 { --topic-color: var(--red);   --topic-bg: var(--red-light); }
  .topic-포지셔닝  { --topic-color: var(--blue);   --topic-bg: var(--blue-light); }
  .topic-포탑      { --topic-color: var(--orange); --topic-bg: var(--orange-light); }
  .topic-심리전    { --topic-color: var(--purple); --topic-bg: var(--purple-light); }

  /* ─── CHAMP TAB ─── */
  .champ-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.18s, transform 0.15s;
  }

  .champ-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }

  .champ-card.hidden { display: none; }

  .champ-header {
    background: var(--surface2);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }

  /* 챔피언 이미지 영역 (나중에 img 태그로 교체) */
  .champ-img-wrap {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    background: var(--gold-light);
    border: 2px solid var(--gold-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }

  .champ-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
  }

  .champ-img-placeholder {
    font-size: 24px;
  }

  .champ-info { flex: 1; }

  .champ-name {
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .champ-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
    letter-spacing: 0.04em;
  }

  .champ-body {
    padding: 18px 20px;
  }

  .champ-section {
    margin-bottom: 16px;
  }

  .champ-section:last-child { margin-bottom: 0; }

  .champ-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .combo-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: center;
  }

  .combo-badge {
    background: var(--blue-light);
    border: 1.5px solid #bfdbfe;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
    font-family: 'Courier New', monospace;
    letter-spacing: 0.04em;
  }

  .combo-arrow {
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 400;
  }

  .tip-item {
    display: flex;
    gap: 9px;
    align-items: flex-start;
    padding: 9px 12px;
    background: var(--surface2);
    border-radius: 7px;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.65;
  }

  .tip-item:last-child { margin-bottom: 0; }

  .tip-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold-mid);
    flex-shrink: 0;
    margin-top: 6px;
  }

  /* ─── CHAMP SEARCH/FILTER ─── */
  .champ-controls {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  /* ─── SUP TAB ─── */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1.5px solid var(--border);
  }

  .sup-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-left: 4px solid var(--red);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.18s;
  }

  .sup-card:hover { box-shadow: var(--shadow-hover); }

  .sup-champ-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .sup-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    background: var(--red-light);
    color: var(--red);
    border-radius: 4px;
    padding: 2px 7px;
  }

  .sup-champ-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--red);
  }

  .sup-content {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
    white-space: pre-line;
  }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .empty-state .icon { font-size: 32px; margin-bottom: 10px; }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="emblem">⚔️</div>
      <div class="header-text">
        <h1>바텀 라인전 고수 노트</h1>
        <p>League of Legends · ADC &amp; Support · Bottom Lane</p>
      </div>
    </div>
    <nav class="tabs">
      <div class="tab active" data-tab="concepts">📋 개념 정리</div>
      <div class="tab" data-tab="champs">🏹 챔피언별 팁</div>
      <div class="tab" data-tab="sup">🛡️ 상대 서포터 대응</div>
    </nav>
  </div>
</header>

<main>

  <!-- ───── TAB 1: 개념 정리 ───── -->
  <div class="tab-content active" id="tab-concepts">
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="conceptSearch" type="text" placeholder="개념 검색...">
      </div>
      <div class="filters" id="conceptFilters"></div>
    </div>
    <div class="stats-bar" id="conceptStats"></div>
    <div class="cards-grid" id="conceptCards"></div>
    <div class="empty-state" id="conceptEmpty" style="display:none">
      <div class="icon">🔎</div>
      검색 결과가 없습니다
    </div>
  </div>

  <!-- ───── TAB 2: 챔피언별 팁 ───── -->
  <div class="tab-content" id="tab-champs">
    <div class="champ-controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="champSearch" type="text" placeholder="챔피언 검색...">
      </div>
      <div class="filters" id="champFilters"></div>
    </div>
    <div class="stats-bar" id="champStats"></div>
    <div id="champCards"></div>
    <div class="empty-state" id="champEmpty" style="display:none">
      <div class="icon">🔎</div>
      검색 결과가 없습니다
    </div>
  </div>

  <!-- ───── TAB 3: 상대 서포터 ───── -->
  <div class="tab-content" id="tab-sup">
    <div class="section-label">상대 서포터 대응법</div>
    <div id="supCards"></div>
  </div>

</main>

<script>
// ═══════════════════════════════
// DATA
// ═══════════════════════════════
const DATA = {
  text: [
    {"주제":"딜교환","핵심내용":"맞으면 같이 때리기","세부설명":"상대가 나를 때렸다면 가능하면 즉시 반격하여 일방적인 손해를 보지 않는다."},
    {"주제":"딜교환","핵심내용":"지속 교전 가치 계산","세부설명":"스킬이 빠졌더라도 평타와 치속 등 지속 화력이 강하면 교전을 이어가는 것을 고려한다."},
    {"주제":"딜교환","핵심내용":"삼각형 딜교 활용","세부설명":"일방적으로 때릴 수 있을 때는 계속 압박하되, 상대가 역으로 삼각형 구도를 만들려 하면 즉시 빠진다."},
    {"주제":"딜교환","핵심내용":"우리 서폿이 원거리일 때","세부설명":"우리 서폿이 원거리 서폿이고 만약에 상대가 그랩으로 서폿을 끌었을 경우 나는 상대의 원딜을 때리면서 상대 원딜이 호응을 할 수 없게 견제"},
    {"주제":"라인전","핵심내용":"선푸쉬 후 웨이브 관리","세부설명":"선푸쉬를 잡았다면 라인을 급하게 밀지 말고 웨이브를 쌓으며 천천히 압박한다."},
    {"주제":"라인전","핵심내용":"유리할 때 라인 걸치기","세부설명":"반반 라인을 유지하며 상대 CS를 방해한다. 강한 타이밍에는 라인을 걸쳐 상대가 미니언을 먹기 어렵게 만든다."},
    {"주제":"라인전","핵심내용":"받아먹는 상황 활용","세부설명":"상대가 선푸쉬 중이라도 라인을 걸칠 수 있다면 상대를 불편하게 만든다. 상대가 선을 넘으며 딜교를 시도하면 같이 응징한다."},

    {"주제":"라인전","핵심내용":"라인전 시 포지셔닝","세부설명":"라인전을 할 땐 한쪽을 등지면서 하라 → 벽에 가깝게 무빙을 쳐라\n가운데에서 딜교시 도망갈 곳이 없어지며 불리해짐"},

// CONCEPT CARDS
// ═══════════════════════════════
(function buildConcepts() {
  const topics = [...new Set(DATA.text.map(d => d['주제']))];
  const filtersEl = document.getElementById('conceptFilters');
  const cardsEl  = document.getElementById('conceptCards');
  const statsEl  = document.getElementById('conceptStats');
  const searchEl = document.getElementById('conceptSearch');
  const emptyEl  = document.getElementById('conceptEmpty');
  let activeTopic = 'all';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = '전체';
  allBtn.dataset.topic = 'all';
  filtersEl.appendChild(allBtn);

  topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = t;
    btn.dataset.topic = t;
    filtersEl.appendChild(btn);
  });

  DATA.text.forEach(item => {
    const card = document.createElement('div');
    const tc = 'topic-' + item['주제'].replace(/\s+/g, '');
    card.className = `card ${tc}`;
    card.dataset.topic = item['주제'];
    card.innerHTML = `
      <div class="card-tag">${item['주제']}</div>
      <div class="card-title">${item['핵심내용']}</div>
      <div class="card-desc">${item['세부설명']}</div>
    `;
    cardsEl.appendChild(card);
  });

  function updateStats() {
    const visible = cardsEl.querySelectorAll('.card:not(.hidden)').length;
    statsEl.innerHTML = `<span>${visible}</span> / ${DATA.text.length}개 표시 중`;
    emptyEl.style.display = visible === 0 ? 'block' : 'none';
  }

  function applyFilters() {
    const query = searchEl.value.trim().toLowerCase();
    cardsEl.querySelectorAll('.card').forEach(card => {
      const topicOk = activeTopic === 'all' || card.dataset.topic === activeTopic;
      const searchOk = !query || card.textContent.toLowerCase().includes(query);
      card.classList.toggle('hidden', !(topicOk && searchOk));
    });
    updateStats();
  }

  filtersEl.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTopic = btn.dataset.topic;
    applyFilters();
  });

  searchEl.addEventListener('input', applyFilters);
  updateStats();
})();

(function buildChamps() {
  const filtersEl = document.getElementById('champFilters');
  const cardsEl  = document.getElementById('champCards');
  const statsEl  = document.getElementById('champStats');
  const searchEl = document.getElementById('champSearch');
  const emptyEl  = document.getElementById('champEmpty');

  // 전체 버튼
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = '전체';
  allBtn.dataset.champ = 'all';
  filtersEl.appendChild(allBtn);

  // 챔피언별 필터 버튼
  DATA.champ.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = c.name;
    btn.dataset.champ = c.name;
    filtersEl.appendChild(btn);
  });

  let activeChamp = 'all';

  // 카드 생성
  DATA.champ.forEach(champ => {
    const card = document.createElement('div');
    card.className = 'champ-card';
    card.dataset.champ = champ.name;

    const imgHTML = champ.image
      ? `<img src="${champ.image}" alt="${champ.name}">`
      : `<span class="champ-img-placeholder">${champ.icon}</span>`;

    const comboHTML = champ.combo.length
      ? champ.combo.map((c, i) =>
          `<span class="combo-badge">${c}</span>${i < champ.combo.length - 1 ? '<span class="combo-arrow">→</span>' : ''}`
        ).join('')
      : '<span style="color:var(--text-muted);font-size:13px">-</span>';

    const tipsHTML = champ.tips.map(t =>
      `<div class="tip-item"><div class="tip-dot"></div><div>${t}</div></div>`
    ).join('');

    card.innerHTML = `
      <div class="champ-header">
        <div class="champ-img-wrap">${imgHTML}</div>
        <div class="champ-info">
          <div class="champ-name">${champ.name}</div>
          <div class="champ-sub">챔피언 팁 · ${champ.tips.length}개</div>
        </div>
      </div>
      <div class="champ-body">
        ${champ.combo.length ? `
        <div class="champ-section">
          <div class="champ-label">콤보 순서</div>
          <div class="combo-badges">${comboHTML}</div>
        </div>` : ''}
        <div class="champ-section">
          <div class="champ-label">꿀팁</div>
          ${tipsHTML}
        </div>
      </div>
    `;
    cardsEl.appendChild(card);
  });

  function updateStats() {
    const visible = cardsEl.querySelectorAll('.champ-card:not(.hidden)').length;
    statsEl.innerHTML = `<span>${visible}</span> / ${DATA.champ.length}명 표시 중`;
    emptyEl.style.display = visible === 0 ? 'block' : 'none';
  }

  function applyFilters() {
    const query = searchEl.value.trim().toLowerCase();
    cardsEl.querySelectorAll('.champ-card').forEach(card => {
      const champOk = activeChamp === 'all' || card.dataset.champ === activeChamp;
      const searchOk = !query || card.textContent.toLowerCase().includes(query);
      card.classList.toggle('hidden', !(champOk && searchOk));
    });
    updateStats();
  }

  filtersEl.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeChamp = btn.dataset.champ;
    applyFilters();
  });

  searchEl.addEventListener('input', applyFilters);
  updateStats();
})();

// ═══════════════════════════════
// SUP CARDS
// ═══════════════════════════════
(function buildSup() {
  const el = document.getElementById('supCards');
  DATA.sup.forEach(item => {
    const card = document.createElement('div');
    card.className = 'sup-card';
    card.innerHTML = `
      <div class="sup-champ-row">
        <span class="sup-badge">상대</span>
        <span class="sup-champ-name">${item['상대법']}</span>
      </div>
      <div class="sup-content">${item['내용']}</div>
    `;
    el.appendChild(card);
  });
})();

// ═══════════════════════════════
// TAB NAVIGATION
// ═══════════════════════════════
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});
</script>
